syntax = "proto3";

package jobpb;

option go_package = "github.com/vihan/distributed-job-queue/internal/transport/grpc/pb;jobpb";

service JobService {
  rpc SubmitJob    (SubmitJobRequest)     returns (SubmitJobResponse);
  rpc GetJob       (GetJobRequest)        returns (GetJobResponse);
  rpc ListDeadJobs (ListDeadJobsRequest)  returns (ListDeadJobsResponse);
  rpc HealthCheck  (HealthCheckRequest)   returns (HealthCheckResponse);
}

message SubmitJobRequest {
  string type          = 1; 
  bytes  payload       = 2; 
  int32  priority      = 3; 
  int64  delay_seconds = 4; 
  int32  max_retries   = 5; 
}

message SubmitJobResponse {
  string job_id = 1;
  string status = 2;
}

message GetJobRequest {
  string job_id = 1;
}

message GetJobResponse {
  string job_id      = 1;
  string type        = 2;
  string status      = 3;
  int32  retry_count = 4;
  string error       = 5;
  int64  created_at  = 6; 
  int64  updated_at  = 7;
}

message ListDeadJobsRequest  {}
message ListDeadJobsResponse {
  repeated GetJobResponse jobs = 1;
}

message HealthCheckRequest  {}
message HealthCheckResponse {
  string status       = 1; 
  int32  queue_length = 2;
}
