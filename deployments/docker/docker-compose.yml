version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile
    command: /bin/server
    ports:
      - "50051:50051" 
      - "8080:8080"   
    environment:
      QUEUE_BACKEND: redis
      REDIS_ADDR: redis:6379
      GRPC_PORT: ":50051"
      HTTP_PORT: ":8080"
      WORKER_COUNT: "5"
      ENV: production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile
    command: /bin/worker
    environment:
      QUEUE_BACKEND: redis
      REDIS_ADDR: redis:6379
      WORKER_COUNT: "10"
      ENV: production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2

volumes:
  redis_data:
